services:
  dummy-app:
    image: alpine
    command: >
      sh -c "while true; do
        echo INFO: GET /api/users 200 42ms;
        sleep 1;
        echo INFO: GET /api/products 200 18ms;
        sleep 1;
        echo WARN: GET /api/orders 200 834ms slow response;
        sleep 1;
        echo ERROR: POST /api/checkout failed database timeout;
        sleep 1;
        echo INFO: GET /health 200 2ms;
        sleep 3;
      done"

  daemon:
    build: ./daemon
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - dummy-app
    restart: on-failure
