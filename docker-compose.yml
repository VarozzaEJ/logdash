services:
  dummy-app:
    image: alpine
    command: >
      sh -c "while true; do
        echo INFO: request handled;
        echo WARN: slow response detected;
        echo ERROR: database connection failed;
        sleep 3;
      done"

  daemon:
    build: ./daemon
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - dummy-app
    restart: on-failure
